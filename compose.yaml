services:
  unistore-db-pg:
    image: postgres:15-alpine
    container_name: unistore-db-postgres
    environment:
      POSTGRES_USER: uniadmin
      POSTGRES_PASSWORD: unipassword
      POSTGRES_DB: unistore_main
    ports:
      - "15031:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  unistore-db-sqlite:
    image: keinos/sqlite3:latest
    container_name: unistore-db-sqlite
    volumes:
      - ./sqlite_data:/root/db
    tty: true
    stdin_open: true
    command: ["/bin/sh"] 

  unistore-s3:
    image: minio/minio:latest
    container_name: unistore-s3-storage
    ports:
      - "15032:9000" # S3 API Port
      - "15033:9001" # MinIO Console (Web UI)
    environment:
      MINIO_ROOT_USER: unistore_admin
      MINIO_ROOT_PASSWORD: unistore_password
    volumes:
      - s3_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  postgres_data:
  s3_data: